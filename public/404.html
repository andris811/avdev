<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <script>
    var path = location.pathname;
    if (path === '/avdev/' || path === '/avdev') {
      document.body.innerHTML = '<p>Page not found. Return to <a href="/avdev/">home</a>.</p>';
    } else {
      location.href = '/avdev/' + path.replace('/avdev/', '') + location.search + location.hash;
    }
  </script>
</head>

</html>
